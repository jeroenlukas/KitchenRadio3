<div class="content">
    <div class="card-grid">
        <div class="card">
            <p class="card-title">Audio</p>
            <p class="reading">Volume: <span id="audioplayer-volume"></span> &percnt;</p>                    
            <input type="range" min="1" max="100" value="50" class="slider" id="slider_volume"><br />
            <button id="button_audio_off" 
                onClick='websocket.send(JSON.stringify({soundmode: "off"}))'>
                Off</button> 

            <button id="button_audio_webradio" 
                onClick='websocket.send(JSON.stringify({soundmode: "radio"}))'>>
                Internet radio</button> 

            <button id="button_audio_bluetooth"
                 onClick='websocket.send(JSON.stringify({soundmode: "bluetooth"}))'>
                 Bluetooth</button>
                 <br />
            <button id="button_audio_prev">&#10094; Prev</button> <button id="button_audio_next">Next &#10095; </button>
        </div>

        <div class="card">
            <p class="card-title">Weather</p>
            <p class="reading">Temperature: <span id="weather-temperature"></span> &deg;C</p>
            <p class="reading">Windspeed: <span id="weather-windspeedkmh"></span> km/h</p>
        </div>
        
    </div>
</div>
